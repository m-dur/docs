<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Financial Data Fetcher - Documentation</title>

    <!-- GitHub Markdown CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown-light.min.css">

    <!-- Prism.js for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />

    <style>
        :root {
            --paper: #f5f1e8;
            --paper-raised: #fbf8f1;
            --paper-hi: #ffffff;
            --ink: #2a2420;
            --ink-soft: #524a3f;
            --ink-muted: #857964;
            --rule: #d9d1bf;
            --rule-soft: #e8e1d0;
            --forest: #2c5e3f;
            --forest-soft: rgba(44, 94, 63, 0.08);
            --forest-medium: rgba(44, 94, 63, 0.18);
            --terracotta: #b8552e;
            --terracotta-soft: rgba(184, 85, 46, 0.1);
            --gold: #c19a3d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.65;
            color: var(--ink);
            background: var(--paper);
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(circle at 1px 1px, rgba(42,36,32,0.03) 1px, transparent 0);
            background-size: 24px 24px;
        }

        /* Header */
        .header {
            background: rgba(251, 248, 241, 0.95);
            color: var(--ink);
            padding: 1.25rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--rule);
            backdrop-filter: blur(8px);
        }
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: var(--ink);
        }
        .logo::before {
            content: '§';
            color: var(--forest);
            margin-right: 0.5rem;
            font-weight: 400;
        }
        .nav-links { display: flex; gap: 0.5rem; }
        .nav-link {
            color: var(--ink-soft);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            font-weight: 500;
            transition: all 0.15s;
            border: 1px solid transparent;
        }
        .nav-link:hover {
            color: var(--forest);
            border-color: var(--forest-medium);
            background: var(--forest-soft);
        }

        /* Layout */
        .layout { display: flex; max-width: 1400px; margin: 0 auto; }
        .sidebar {
            width: 280px;
            position: sticky;
            top: 74px;
            height: calc(100vh - 74px);
            overflow-y: auto;
            padding: 2rem 1rem 2rem 2rem;
            border-right: 1px solid var(--rule);
        }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
        .toc-title {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: 0.875rem;
            color: var(--ink-muted);
            margin-bottom: 1.25rem;
            padding: 0 0.5rem;
        }
        .toc-list { list-style: none; padding: 0; }
        .toc-list li { margin-bottom: 0.125rem; }
        .toc-list a {
            display: block;
            padding: 0.4rem 0.75rem;
            color: var(--ink-soft);
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.875rem;
            transition: all 0.15s;
            border-left: 2px solid transparent;
        }
        .toc-list a:hover, .toc-list a.active {
            background: var(--forest-soft);
            color: var(--forest);
            border-left-color: var(--forest);
        }
        .toc-h1 { font-weight: 600; }
        .toc-h2 { padding-left: 1.25rem !important; font-size: 0.84rem !important; }
        .toc-h3 { padding-left: 2rem !important; font-size: 0.8rem !important; color: var(--ink-muted) !important; }

        /* Main */
        .main-content {
            flex: 1;
            padding: 2.5rem 0 4rem;
            min-height: calc(100vh - 74px);
        }
        .markdown-body {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 2.5rem;
        }
        .markdown-body h1 {
            font-family: 'Fraunces', serif;
            font-weight: 500;
            font-size: 3rem;
            line-height: 1.05;
            letter-spacing: -0.02em;
            color: var(--ink);
            margin-bottom: 1rem;
            margin-top: 0.5rem;
        }
        .markdown-body h2 {
            font-family: 'Fraunces', serif;
            font-weight: 500;
            font-size: 1.75rem;
            letter-spacing: -0.01em;
            margin-top: 3rem;
            margin-bottom: 1rem;
            color: var(--ink);
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--rule);
        }
        .markdown-body h3 {
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 1.75rem;
            margin-bottom: 0.5rem;
            color: var(--ink);
        }
        .markdown-body p {
            margin: 0.75rem 0;
            color: var(--ink-soft);
        }
        .markdown-body ul, .markdown-body ol {
            margin: 0.75rem 0 0.75rem 1.5rem;
            color: var(--ink-soft);
        }
        .markdown-body li { margin: 0.25rem 0; }
        .markdown-body a {
            color: var(--forest);
            text-decoration: none;
            border-bottom: 1px solid var(--forest-medium);
            transition: all 0.15s;
        }
        .markdown-body a:hover {
            color: var(--terracotta);
            border-bottom-color: var(--terracotta);
        }
        .markdown-body strong { color: var(--ink); }
        .markdown-body blockquote {
            border-left: 3px solid var(--forest);
            background: var(--forest-soft);
            padding: 0.75rem 1.25rem;
            margin: 1rem 0;
            border-radius: 0 4px 4px 0;
            color: var(--ink-soft);
            font-style: italic;
        }
        .markdown-body code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--paper-hi);
            border: 1px solid var(--rule);
            padding: 0.125rem 0.4rem;
            border-radius: 3px;
            font-size: 0.875em;
            color: var(--terracotta);
        }
        .markdown-body pre {
            background: var(--paper-hi);
            border: 1px solid var(--rule);
            border-radius: 6px;
            padding: 1rem 1.25rem;
            margin: 1.25rem 0;
            overflow-x: auto;
            position: relative;
        }
        .markdown-body pre code {
            background: transparent;
            border: none;
            padding: 0;
            color: var(--ink-soft);
            font-size: 0.875rem;
            line-height: 1.5;
        }
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.25rem 0;
            background: var(--paper-hi);
            border: 1px solid var(--rule);
            border-radius: 6px;
            overflow: hidden;
            font-size: 0.9375rem;
        }
        .markdown-body th, .markdown-body td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--rule-soft);
            text-align: left;
        }
        .markdown-body th {
            background: var(--paper);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--ink-muted);
        }
        .markdown-body tr:last-child td { border-bottom: none; }
        .markdown-body tr:hover td { background: var(--forest-soft); }
        .markdown-body img { max-width: 100%; height: auto; display: block; margin: 1.25rem auto; }
        .markdown-body hr {
            border: none;
            border-top: 1px solid var(--rule);
            margin: 2rem 0;
        }

        /* Copy button */
        .code-wrapper { position: relative; }
        .copy-button {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.25rem 0.625rem;
            background: var(--paper);
            border: 1px solid var(--rule);
            border-radius: 3px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            color: var(--ink-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.15s;
        }
        .copy-button:hover {
            color: var(--forest);
            border-color: var(--forest-medium);
        }
        .copy-button.copied {
            color: var(--terracotta);
            border-color: rgba(184,85,46,0.3);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--ink-muted);
            font-family: 'Fraunces', serif;
            font-style: italic;
        }
        .error {
            background: var(--terracotta-soft);
            border: 1px solid rgba(184,85,46,0.3);
            padding: 1rem 1.25rem;
            border-radius: 6px;
            margin: 1.25rem 0;
            color: var(--terracotta);
        }

        @media (max-width: 1024px) {
            .sidebar { display: none; }
            .markdown-body { padding: 0 1.5rem; }
            .markdown-body h1 { font-size: 2.25rem; }
        }
        @media (max-width: 768px) {
            .header-content { flex-direction: column; gap: 0.75rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span>Financial Data Fetcher</span>
            </div>
            <nav class="nav-links">
                <a href="changelog.html" class="nav-link">Changelog</a>
                <a href="index.html" class="nav-link">Portfolio</a>
                <a href="dashboard.html" class="nav-link" style="background: rgba(255,255,255,0.2); padding: 0.5rem 1rem; border-radius: 6px;">View Demo (Sample Data)</a>
            </nav>
        </div>
    </header>

    <div class="layout">
        <!-- Sidebar Table of Contents -->
        <aside class="sidebar" id="sidebar">
            <div class="toc-title">Table of Contents</div>
            <ul class="toc-list" id="toc-list">
                <!-- TOC will be generated here -->
            </ul>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <div id="content" class="markdown-body">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading documentation...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Back to top button -->
    <div class="back-to-top" id="back-to-top" onclick="scrollToTop()">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 15l-6-6-6 6"/>
        </svg>
    </div>

    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- PlantUML support -->
    <script src="https://unpkg.com/plantuml-encoder@1.4.0/dist/plantuml-encoder.min.js"></script>

    <!-- Prism.js for syntax highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-docker.min.js"></script>

    <script>
        // Configure marked options
        marked.setOptions({
            highlight: function(code, lang) {
                if (Prism.languages[lang]) {
                    return Prism.highlight(code, Prism.languages[lang], lang);
                }
                return code;
            },
            breaks: true,
            gfm: true,
            headerIds: true,
            mangle: false
        });

        // Generate table of contents
        function generateTOC(markdown) {
            const toc = [];
            const headingRegex = /^(#{1,3})\s+(.+)$/gm;
            let match;

            while ((match = headingRegex.exec(markdown)) !== null) {
                const level = match[1].length;
                const text = match[2];
                const id = text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-');

                toc.push({
                    level: level,
                    text: text,
                    id: id
                });
            }

            return toc;
        }

        // Render table of contents
        function renderTOC(toc) {
            const tocList = document.getElementById('toc-list');
            tocList.innerHTML = '';

            toc.forEach(item => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = `#${item.id}`;
                a.textContent = item.text;
                a.className = `toc-h${item.level}`;

                // Add click event for smooth scrolling and active state
                a.addEventListener('click', function(e) {
                    e.preventDefault();
                    const target = document.getElementById(item.id);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });

                        // Update active state
                        document.querySelectorAll('.toc-list a').forEach(link => {
                            link.classList.remove('active');
                        });
                        this.classList.add('active');
                    }
                });

                li.appendChild(a);
                tocList.appendChild(li);
            });
        }

        // Add IDs to headings for navigation
        function addHeadingIds(html) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;

            tempDiv.querySelectorAll('h1, h2, h3').forEach(heading => {
                const text = heading.textContent;
                const id = text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-');
                heading.id = id;
            });

            return tempDiv.innerHTML;
        }

        // Add copy buttons to code blocks
        function addCopyButtons() {
            document.querySelectorAll('pre').forEach(pre => {
                // Skip PlantUML code blocks for copy button
                const code = pre.querySelector('code');
                if (code && code.className.includes('language-plantuml')) {
                    return;
                }

                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);

                const button = document.createElement('button');
                button.className = 'copy-button';
                button.textContent = 'Copy';
                button.onclick = function() {
                    const code = pre.querySelector('code');
                    const text = code ? code.textContent : pre.textContent;

                    navigator.clipboard.writeText(text).then(() => {
                        button.textContent = 'Copied!';
                        button.classList.add('copied');
                        setTimeout(() => {
                            button.textContent = 'Copy';
                            button.classList.remove('copied');
                        }, 2000);
                    });
                };

                wrapper.appendChild(button);
            });
        }

        // Render PlantUML diagrams
        function renderPlantUML() {
            const plantumlServer = 'https://www.plantuml.com/plantuml/svg/';

            document.querySelectorAll('code.language-plantuml').forEach(codeBlock => {
                const pre = codeBlock.parentElement;
                const plantumlCode = codeBlock.textContent;

                // Remove @startuml and @enduml if present
                const cleanCode = plantumlCode
                    .replace(/@startuml\s*/g, '')
                    .replace(/@enduml\s*/g, '')
                    .trim();

                try {
                    // Encode the PlantUML code
                    const encoded = plantumlEncoder.encode(cleanCode);
                    const imageUrl = plantumlServer + encoded;

                    // Create an image element
                    const img = document.createElement('img');
                    img.src = imageUrl;
                    img.style.maxWidth = '100%';
                    img.style.height = 'auto';
                    img.style.display = 'block';
                    img.style.margin = '1rem auto';
                    img.alt = 'Architecture Diagram';

                    // Replace the code block with the image
                    pre.parentNode.replaceChild(img, pre);
                } catch (error) {
                    console.error('Error rendering PlantUML:', error);
                    // Keep the code block if rendering fails
                }
            });
        }

        // Load and render README
        async function loadReadme() {
            const contentDiv = document.getElementById('content');

            try {
                const response = await fetch('README.md');

                if (!response.ok) {
                    throw new Error('README.md not found');
                }

                const markdown = await response.text();

                // Generate and render table of contents
                const toc = generateTOC(markdown);
                renderTOC(toc);

                // Parse and render markdown
                let html = marked.parse(markdown);
                html = addHeadingIds(html);
                contentDiv.innerHTML = html;

                // Apply syntax highlighting
                Prism.highlightAll();

                // Render PlantUML diagrams
                renderPlantUML();

                // Add copy buttons to code blocks
                addCopyButtons();

                // Make external links open in new tab
                document.querySelectorAll('.markdown-body a').forEach(link => {
                    if (link.hostname !== window.location.hostname) {
                        link.setAttribute('target', '_blank');
                        link.setAttribute('rel', 'noopener noreferrer');
                    }
                });

                // Highlight current section in TOC on scroll
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const id = entry.target.id;
                            document.querySelectorAll('.toc-list a').forEach(link => {
                                link.classList.remove('active');
                                if (link.getAttribute('href') === `#${id}`) {
                                    link.classList.add('active');
                                }
                            });
                        }
                    });
                }, { rootMargin: '-80px 0px -80% 0px' });

                document.querySelectorAll('h1, h2, h3').forEach(heading => {
                    observer.observe(heading);
                });

            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <h2>Unable to load README.md</h2>
                        <p>Please ensure that your README.md file is in the root of your repository.</p>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `;
            }
        }

        // Back to top functionality
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Show/hide back to top button
        window.addEventListener('scroll', () => {
            const backToTop = document.getElementById('back-to-top');
            if (window.scrollY > 300) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        });

        // Load README when page loads
        document.addEventListener('DOMContentLoaded', loadReadme);
    </script>
</body>
</html>
